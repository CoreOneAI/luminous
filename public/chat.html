<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Luminous • Chat</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
<style>
  *{box-sizing:border-box} html,body{margin:0;padding:0}
  :root{--charcoal:#2C2C2C;--gold:#B8860B;--pearl:#F8F8F8;--ink:#111;--muted:#666;--grad:linear-gradient(135deg,#B8860B,#DAA520)}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:var(--charcoal);color:var(--ink)}
  .page{max-width:414px;margin:0 auto;min-height:100vh;background:var(--pearl);display:flex;flex-direction:column}
  .header{background:#2C2C2C;color:#fff;padding:14px;border-bottom:1px solid #3A3A3A;position:sticky;top:0;z-index:5;text-align:center}
  .brand{font-weight:800;font-size:18px;letter-spacing:.2px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .sub{margin-top:2px;font-size:11px;color:#e8c77a;font-weight:600;opacity:.95}
  .chips{display:flex;gap:8px;padding:10px 12px;flex-wrap:wrap;background:#fff;border-bottom:1px solid #eee}
  .chip{font-size:11px;border:1px solid #E6E6E6;border-radius:16px;padding:6px 10px;background:#fafafa;cursor:pointer}
  .chip:hover{background:#f2f2f2}
  .content{flex:1;overflow:auto;padding:10px 12px 120px}
  .bubble-wrap{display:flex;margin:8px 0}
  .me{justify-content:flex-end}
  .bubble{max-width:80%;padding:10px 12px;border-radius:14px;font-size:13px;line-height:1.35;box-shadow:0 1px 4px rgba(0,0,0,.06)}
  .me .bubble{background:linear-gradient(135deg,#f9f6ef,#fff);border:1px solid #eee}
  .bot .bubble{background:#fff;border:1px solid #eee}
  .followup{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
  .fu-btn{border:1px solid #E6E6E6;background:#FAFAFA;color:#333;border-radius:12px;padding:6px 10px;font-size:12px;cursor:pointer}
  .list-hd{display:flex;justify-content:space-between;align-items:center;margin:12px 2px 8px}
  .list-hd .h{font-size:12px;color:#555}
  .loadmore{border:none;border-radius:20px;padding:10px 14px;background:var(--grad);color:#fff;font-weight:700;cursor:pointer}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .card{background:#fff;border:1px solid #eee;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05)}
  .imgbx{width:100%;height:120px;background:#f6f6f6;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .imgbx img{width:100%;height:100%;object-fit:cover}
  .meta{padding:10px}
  .brand{font-size:10px;color:#888;margin-bottom:2px}
  .name{font-size:12px;font-weight:800;color:#222;min-height:30px}
  .cat{font-size:11px;color:#777;margin-top:4px}
  .price{font-size:12px;font-weight:800;color:var(--gold);margin-top:6px}
  .add{width:100%;margin-top:8px;border:none;border-radius:10px;padding:8px;background:var(--grad);color:#fff;font-weight:700;font-size:12px;cursor:pointer}
  .dock{position:fixed;left:50%;transform:translateX(-50%);bottom:60px;width:100%;max-width:414px;padding:10px 12px;z-index:11}
  .composer{display:flex;gap:8px;align-items:center;background:#fff;border-radius:26px;padding:8px 10px;border:1.5px solid #e7d3a6;box-shadow:0 4px 12px rgba(0,0,0,.06)}
  .composer input{flex:1;border:none;outline:none;font-size:13px;background:transparent;color:var(--ink)}
  .composer input::placeholder{color:#9A9A9A}
  .btn-send{border:none;width:40px;height:36px;border-radius:18px;background:var(--grad);color:#fff;font-weight:800;cursor:pointer}
  .nav{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:414px;background:#fff;border-top:1px solid #E0E0E0;height:60px;display:grid;grid-template-columns:repeat(4,1fr);align-items:center;z-index:10}
  .nav a{text-decoration:none;color:#777;font-size:11px;text-align:center}
  .nav a.active{color:var(--gold);font-weight:700}
</style>
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="brand">Luminous Chat</div>
      <div class="sub">Ask • Discover • Add to Cart</div>
    </header>

    <!-- quick topics -->
    <div class="chips">
      <div class="chip" data-q="shampoo">Shampoo</div>
      <div class="chip" data-q="conditioner">Conditioner</div>
      <div class="chip" data-q="anti-frizz">Anti-Frizz</div>
      <div class="chip" data-q="purple shampoo">Purple</div>
      <div class="chip" data-q="sensitive scalp">Sensitive Scalp</div>
      <div class="chip" data-q="hydrating mask">Hydrating</div>
    </div>

    <main class="content" id="content">
      <!-- seeded helper message -->
      <div class="bubble-wrap bot">
        <div class="bubble">
          Hi! Ask about routines, ingredients, or products. I’ll answer and show matching items below.
        </div>
      </div>

      <!-- products header + grid -->
      <div class="list-hd" id="listHd" style="display:none">
        <div class="h" id="countText"></div>
        <button class="loadmore" id="loadMoreBtn" style="display:none">Load more</button>
      </div>
      <div class="grid" id="grid"></div>
    </main>

    <!-- composer -->
    <div class="dock">
      <div class="composer">
        <input id="q" placeholder="e.g., red shampoo for color care"/>
        <button class="btn-send" id="sendBtn">Go</button>
      </div>
    </div>

    <!-- bottom nav -->
    <nav class="nav" role="navigation" aria-label="Bottom Navigation">
      <a href="/index.html">Home</a>
      <a href="#" onclick="window.location='/index.html#book';return false;">Book</a>
      <a href="/catalog.html">Shop</a>
      <a href="/chat.html" class="active">Chat</a>
    </nav>
  </div>

<script>
  const API = ''; // same-origin
  const grid = document.getElementById('grid');
  const countText = document.getElementById('countText');
  const listHd = document.getElementById('listHd');
  const loadMoreBtn = document.getElementById('loadMoreBtn');

  let lastQuery = '';
  let offset = 0;
  const LIMIT = 50;
  let total = 0;

  // ---- helpers
  const $ = sel => document.querySelector(sel);
  function centsToUSD(c){ const n = Number(c||0); return '$' + (n/100).toFixed(2); }
  function fallbackImg(el){ el.onerror=null; el.src='/images/wooden-tray.png'; }
  function addBubble(text, who='bot'){
    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap ' + (who==='me' ? 'me' : 'bot');
    const b = document.createElement('div');
    b.className = 'bubble';
    b.textContent = text;
    wrap.appendChild(b);
    document.getElementById('content').insertBefore(wrap, listHd);
    wrap.scrollIntoView({behavior:'smooth',block:'end'});
  }
  function renderFollowUp(fu){
    const wrap = document.createElement('div');
    wrap.className = 'bubble-wrap bot';
    const b = document.createElement('div'); b.className='bubble';
    const q = document.createElement('div'); q.textContent = fu.question || 'A quick question:';
    const row = document.createElement('div'); row.className='followup';
    (fu.options || []).forEach(opt=>{
      const btn = document.createElement('button'); btn.className='fu-btn'; btn.textContent = opt;
      btn.onclick = ()=> {
        addBubble(opt, 'me');
        // refine query and search again
        const refined = (lastQuery ? (lastQuery + ' ') : '') + (fu.key + ':' + opt);
        searchProducts(refined, true);
      };
      row.appendChild(btn);
    });
    b.appendChild(q); b.appendChild(row); wrap.appendChild(b);
    document.getElementById('content').insertBefore(wrap, listHd);
  }

  // ---- products rendering
  function clearProducts(){ grid.innerHTML=''; offset=0; total=0; countText.textContent=''; listHd.style.display='none'; loadMoreBtn.style.display='none'; }
  function cardHTML(it){
    const brand = it.brand ? `<div class="brand">${it.brand}</div>` : '';
    const cat = it.category ? `<div class="cat">${it.category}</div>` : '';
    const price = typeof it.price === 'number' ? centsToUSD(it.price) : '$—';
    const img = it.image && it.image.startsWith('http') ? '' : (it.image || '');
    const src = img || '/images/wooden-tray.png';
    return `
      <article class="card">
        <div class="imgbx"><img src="${src}" alt="${(it.name||'Product')}" onerror="this.onerror=null;this.src='/images/wooden-tray.png'"/></div>
        <div class="meta">
          ${brand}
          <div class="name">${it.name || 'Unnamed'}</div>
          ${cat}
          <div class="price">${price}</div>
          <button class="add" data-id="${it.id}">Add to Cart</button>
        </div>
      </article>`;
  }
  function wireAddButtons(){
    grid.querySelectorAll('.add').forEach(btn=>{
      btn.onclick = ()=>{
        const id = btn.getAttribute('data-id');
        const item = window.__lastItems?.find(x=>String(x.id)===String(id));
        if (!item) return;
        const cart = JSON.parse(localStorage.getItem('cart')||'[]');
        cart.push({ id:item.id, name:item.name, price:item.price, qty:1 });
        localStorage.setItem('cart', JSON.stringify(cart));
        btn.textContent = 'Added';
        setTimeout(()=>btn.textContent='Add to Cart', 1200);
      };
    });
  }

  // ---- search & load
  async function searchProducts(q, fromFollowUp=false){
    lastQuery = q;
    if (!fromFollowUp){ addBubble(q, 'me'); }

    // 1) talk to advisor (text)
    try{
      const r = await fetch(`${API}/api/chat`, {
        method:'POST', headers:{'Content-Type':'application/json','Accept':'application/json'},
        body: JSON.stringify({ message: q })
      });
      const t = await r.text();
      let data = {};
      try { data = JSON.parse(t); } catch{}
      if (data?.response) addBubble(data.response, 'bot');
      if (data?.followUp) renderFollowUp(data.followUp);
    }catch(e){
      addBubble('Advisor temporarily unavailable. Quick tip: hydrate mid-lengths, use heat protectant, and book a gloss for shine.', 'bot');
    }

    // 2) fetch products (50 at a time)
    clearProducts();
    await loadMore(true);
  }

  async function loadMore(firstPage=false){
    const params = new URLSearchParams({ q:lastQuery, offset:String(offset), limit:String(LIMIT) });
    try{
      const r = await fetch(`${API}/api/products?` + params.toString());
      const data = await r.json();
      total = data.total || 0;
      const items = data.items || [];
      window.__lastItems = (window.__lastItems || []).concat(items);

      if (firstPage && total===0){
        // one widen attempt: if user asked for “red shampoo”, fall back to just “shampoo”
        const basic = (lastQuery||'').match(/\b(shampoo|conditioner|serum|spray|mask)\b/i);
        if (basic){
          const r2 = await fetch(`${API}/api/products?` + new URLSearchParams({ q: basic[1], offset:'0', limit:String(LIMIT) }));
          const d2 = await r2.json();
          total = d2.total || 0;
          window.__lastItems = d2.items || [];
          grid.innerHTML = (window.__lastItems||[]).map(cardHTML).join('');
          listHd.style.display = 'flex';
          countText.textContent = `${total} products • showing ${(window.__lastItems||[]).length}`;
          loadMoreBtn.style.display = (window.__lastItems||[]).length < total ? 'inline-block' : 'none';
          wireAddButtons();
          return;
        }
      }

      // render
      const html = items.map(cardHTML).join('');
      grid.insertAdjacentHTML('beforeend', html);
      listHd.style.display = 'flex';
      const shown = (grid.children || []).length;
      countText.textContent = `${total} products • showing ${shown}`;
      loadMoreBtn.style.display = shown < total ? 'inline-block' : 'none';
      wireAddButtons();

      offset += items.length;
    }catch(e){
      listHd.style.display='flex';
      countText.textContent = 'No products loaded. Check /api/products and /public/data/products.json';
    }
  }

  // ---- events
  document.getElementById('sendBtn').onclick = ()=> {
    const q = (document.getElementById('q').value||'').trim();
    if (!q) return;
    searchProducts(q);
  };
  document.getElementById('q').addEventListener('keydown', (e)=>{ if(e.key==='Enter') $('#sendBtn').click(); });
  loadMoreBtn.onclick = ()=> loadMore(false);
  document.querySelectorAll('.chip').forEach(c => {
    c.onclick = ()=> {
      const q = c.getAttribute('data-q');
      $('#q').value = q;
      searchProducts(q);
    };
  });

  // Optional: seed first view with a popular category
  // searchProducts('shampoo');
</script>
</body>
</html>
