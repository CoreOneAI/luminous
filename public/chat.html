<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luminous • Shop & Advisor</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--charcoal:#2C2C2C;--gold:#B8860B;--pearl:#F8F8F8;--ink:#111;--muted:#666;--grad:linear-gradient(135deg,#B8860B,#DAA520)}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--charcoal);color:var(--ink)}
    .page{max-width:414px;margin:0 auto;min-height:100vh;background:var(--pearl); padding-bottom:120px}
    .header{background:#fff;padding:16px;border-bottom:1px solid #eee;position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between}
    .brand{font-weight:800;font-size:18px;letter-spacing:.3px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .iconbtn{border:1px solid #e6e6e6;border-radius:12px;background:#fafafa;padding:6px 10px;cursor:pointer;display:flex;align-items:center;gap:8px}
    .badge{min-width:18px;height:18px;background:var(--gold);color:#fff;border-radius:9px;font-size:10px;display:none;align-items:center;justify-content:center;padding:0 5px}
    .main{padding:12px}
    .thread{display:flex;flex-direction:column;gap:10px}
    .msg{background:#fff;border:1px solid #eee;border-radius:12px;padding:10px 12px;box-shadow:0 2px 8px rgba(0,0,0,.04);max-width:85%;line-height:1.35;white-space:pre-line}
    .me{align-self:flex-end;background:#f9f6ee;border-color:#f0e6c8}
    .bot{align-self:flex-start}
    .cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}
    .card{background:#fff;border:1px solid #eee;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06)}
    .card img{width:100%;height:120px;object-fit:cover;background:#f6f6f6}
    .card .meta{padding:10px 10px 12px}
    .card .name{font-size:12px;font-weight:700;line-height:1.2;min-height:28px}
    .card .brand{font-size:11px;color:#777;margin-top:4px}
    .card .row{margin-top:8px;display:flex;justify-content:space-between;align-items:center}
    .price{font-size:12px;font-weight:800;color:var(--gold)}
    .btn{border:none;border-radius:18px;padding:8px 10px;font-weight:800;letter-spacing:.2px;color:#fff;background:var(--grad);cursor:pointer;font-size:12px}
    .composer{position:fixed;left:50%;transform:translateX(-50%);bottom:60px;max-width:414px;width:100%;padding:10px 12px}
    .composer .box{display:flex;gap:8px;align-items:center;background:#fff;border-radius:26px;padding:8px 10px;border:1.5px solid #e7d3a6;box-shadow:0 4px 12px rgba(0,0,0,.06)}
    .composer input{flex:1;border:none;outline:none;font-size:13px;background:transparent;color:var(--ink)}
    .composer input::placeholder{color:#9A9A9A}
    .composer .btn-send{border:none;width:40px;height:36px;border-radius:18px;background:var(--grad);color:#fff;font-weight:800;cursor:pointer}
    .followup{position:fixed;left:50%;transform:translateX(-50%);bottom:122px;max-width:414px;width:100%;padding:0 12px}
    .fu-box{background:#fff;border:1px solid #eee;border-radius:12px;padding:10px;display:none}
    .fu-q{font-size:12px;font-weight:700}
    .fu-opts{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
    .fu-opt{padding:6px 10px;border:1px solid #e6e6e6;border-radius:16px;background:#fafafa;font-size:12px;cursor:pointer}
    .fu-actions{margin-top:8px;display:flex;gap:8px}
    .fu-actions .btn{flex:1}
    .nav{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:414px;background:#fff;border-top:1px solid #E0E0E0;height:60px;display:grid;grid-template-columns:repeat(4,1fr);align-items:center;z-index:10}
    .nav a{text-decoration:none;color:#777;font-size:11px;text-align:center}
    .nav a.active{color:var(--gold);font-weight:700}
    .drawer{position:fixed;right:-320px;top:0;width:320px;height:100vh;background:#fff;border-left:1px solid #eee;box-shadow:-4px 0 16px rgba(0,0,0,.12);transition:right .25s ease;z-index:20;padding:12px}
    .drawer.open{right:0}
    .drawer h3{font-size:14px}
    .drawer .item{display:flex;gap:8px;align-items:center;border-bottom:1px solid #f0f0f0;padding:8px 0}
    .drawer .name{font-size:12px;font-weight:700}
    .drawer .qty{font-size:12px;color:#555}
    .drawer .total{margin-top:8px;font-weight:800}
    .empty{font-size:12px;color:#777}
    .svg{width:16px;height:16px;display:inline-block}
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="brand">Luminous • Shop</div>
      <button class="iconbtn" id="cartBtn" title="Cart">
        <svg class="svg" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1.5"><path d="M6 6h15l-1.5 9h-12z"/><circle cx="9" cy="20" r="1.5"/><circle cx="17" cy="20" r="1.5"/></svg>
        <span class="badge" id="cartCount">0</span>
      </button>
    </header>

    <main class="main">
      <div id="thread" class="thread" aria-live="polite"></div>
    </main>

    <div class="followup">
      <div class="fu-box" id="fuBox">
        <div class="fu-q" id="fuQ"></div>
        <div class="fu-opts" id="fuOpts"></div>
        <div class="fu-actions">
          <button class="btn" id="fuSubmit">Submit</button>
          <button class="btn" id="fuSkip" style="background:#999">Skip</button>
        </div>
      </div>
    </div>

    <div class="composer" id="composer">
      <div class="box">
        <input id="askInput" placeholder="Ask the advisor… e.g., best anti-aging routine / brassy color / heat damage" />
        <button class="btn-send" id="askBtn">Go</button>
      </div>
    </div>

    <nav class="nav" role="navigation" aria-label="Bottom Navigation">
      <a href="/index.html">Home</a>
      <a href="#" onclick="location.href='/index.html#book';return false;">Book</a>
      <a class="active" href="/chat.html">Shop</a>
      <a href="/account.html">Account</a>
    </nav>
  </div>

  <div class="drawer" id="drawer">
    <h3>Your Cart</h3>
    <div id="cartItems"></div>
    <div class="total" id="cartTotal">$0.00</div>
  </div>

<script>
(function(){
  if (window.__LUM_CHAT_INIT__) return;
  window.__LUM_CHAT_INIT__ = true;

  const API_BASE = '';
  let advisorContext = { answers: {} };
  let originalQuestion = '';
  let lastFollowUpKey = null;
  let catalog = [];
  let cart = JSON.parse(localStorage.getItem('luminous_cart')||'[]');

  const $ = sel => document.querySelector(sel);
  const fmt = c => '$' + (Number(c||0)/100).toFixed(2);
  const imgFor = (p) => p.image || 'https://images.unsplash.com/photo-1556228453-efd1f4a7fae9?auto=format&fit=crop&w=800&q=60';

  function appendMsg(text, me=false){
    const m = document.createElement('div');
    m.className = 'msg ' + (me?'me':'bot');
    m.textContent = text;
    $('#thread').appendChild(m);
    m.scrollIntoView({ behavior:'smooth', block:'end' });
  }

  function renderCards(items){
    if (!items || !items.length) return;
    const wrap = document.createElement('div');
    wrap.className = 'cards';
    items.forEach(p => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <img src="${imgFor(p)}" alt=""/>
        <div class="meta">
          <div class="name">${p.name}</div>
          <div class="brand">${p.brand || p.category || ''}</div>
          <div class="row">
            <div class="price">${fmt(p.price)}</div>
            <button class="btn" data-id="${p.id}">Add</button>
          </div>
        </div>`;
      wrap.appendChild(card);
    });
    wrap.addEventListener('click', (e)=>{
      const btn = e.target.closest('.btn');
      if (!btn) return;
      const id = btn.getAttribute('data-id');
      const p = (catalog||[]).find(x => x.id === id);
      if (p) addToCart(p);
    });
    $('#thread').appendChild(wrap);
    wrap.scrollIntoView({ behavior:'smooth', block:'end' });
  }

  function dedupe(arr){ const seen=new Set(); const out=[]; (arr||[]).forEach(p=>{ if(!seen.has(p.id)){ seen.add(p.id); out.push(p);} }); return out; }
  function matchProductsFromText(text){
    const t = (text||'').toLowerCase();
    const MAP = {
      'anti-aging': ['anti aging','anti-aging','antiaging','wrinkle','fine line','retinol','peptide','collagen','firm','lift','vitamin c','brighten','dark spot','hyperpigment','spf','sunscreen','night cream','serum','eye'],
      'hydration':  ['hydrate','hydration','hyaluronic','ceramide','moistur','barrier','dehydrated','dry skin','cream'],
      'color-care': ['color','highlight','balayage','brassy','tone','gloss','purple shampoo','bond','repair','mask'],
      'nails':      ['nail','gel','acrylic','cuticle','polish'],
      'haircare':   ['heat protect','frizz','split ends','breakage','dry hair','mask','shampoo','conditioner','oil']
    };
    const hasAA  = MAP['anti-aging'].some(k=>t.includes(k));
    const hasHyd = MAP['hydration'].some(k=>t.includes(k));
    const hasCol = MAP['color-care'].some(k=>t.includes(k));
    const hasN   = MAP['nails'].some(k=>t.includes(k));
    const hasH   = MAP['haircare'].some(k=>t.includes(k));

    const by = (rx) => (catalog||[]).filter(p => rx.test(((p.name||'')+' '+(p.category||'')+' '+(p.brand||'')).toLowerCase()));
    if (hasAA)  return dedupe([ ...by(/retinol|peptide|collagen|vitamin c|anti[- ]?aging|wrinkle|firm|spf|sunscreen/) , ...by(/serum|cream|night|spf/) ]).slice(0,8);
    if (hasHyd) return by(/hyalur|ceramide|hydrate|moistur|barrier|mask|cream|serum/).slice(0,8);
    if (hasCol) return by(/color|gloss|toner|purple|bond|repair|mask|shampoo|protect/).slice(0,8);
    if (hasN)   return by(/nail|gel|acrylic|cuticle|polish/).slice(0,8);
    if (hasH)   return by(/heat|protect|frizz|repair|mask|oil|shampoo|condition/).slice(0,8);
    const words = t.split(/[^a-z0-9]+/).filter(w=>w.length>3);
    const byName = (catalog||[]).filter(p => words.some(w => (p.name||'').toLowerCase().includes(w)));
    return byName.length ? dedupe(byName).slice(0,8) : (catalog||[]).slice(0,8);
  }

  async function loadCatalog(){
    try{
      const r = await fetch(`${API_BASE}/api/products`, { cache: 'no-store' });
      const j = await r.json();
      catalog = j.items || [];
    }catch(e){ console.error('catalog load failed', e); catalog = []; }
  }

  async function askAdvisor(q){
    originalQuestion = q;
    appendMsg(q, true);
    try{
      const r = await fetch(`${API_BASE}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type':'application/json','Accept':'application/json' },
        body: JSON.stringify({ message: q, context: advisorContext })
      });
      const data = await r.json();
      if (data.followUp && data.followUp.key){
        lastFollowUpKey = data.followUp.key;
        showFollowUp(data.followUp);
        if (data.response) appendMsg(data.response, false);
        return;
      }
      const text = data.response || 'No response.';
      appendMsg(text, false);
      renderCards(matchProductsFromText(text + ' ' + q));
    }catch(e){
      console.error('advisor failed', e);
      appendMsg('Advisor temporarily unavailable. Quick tip: hydrate mid-lengths, use heat protectant, and book a gloss for shine.', false);
      renderCards((catalog||[]).slice(0,6));
    }
  }

  function showFollowUp(fu){
    const box = $('#fuBox'); box.style.display='block';
    $('#fuQ').textContent = fu.question || 'A quick question:';
    const opts = $('#fuOpts'); opts.innerHTML='';
    (fu.options||[]).forEach(o=>{
      const b = document.createElement('div');
      b.className='fu-opt'; b.textContent=o;
      b.addEventListener('click', ()=>{
        document.querySelectorAll('.fu-opt').forEach(x=>x.style.background='#fafafa');
        b.style.background='#f2e7c5';
        $('#fuSubmit').dataset.value=o;
      });
      opts.appendChild(b);
    });
  }
  function hideFollowUp(){
    const box = $('#fuBox'); box.style.display='none';
    $('#fuSubmit').dataset.value='';
  }

  document.getElementById('fuSubmit').addEventListener('click', async ()=>{
    const val = $('#fuSubmit').dataset.value || '';
    hideFollowUp();
    if (!val || !lastFollowUpKey) return;
    advisorContext.answers[lastFollowUpKey] = val;
    try{
      const r = await fetch(`${API_BASE}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type':'application/json','Accept':'application/json' },
        body: JSON.stringify({ message: originalQuestion, context: advisorContext })
      });
      const data = await r.json();
      if (data.followUp && data.followUp.key){ lastFollowUpKey = data.followUp.key; showFollowUp(data.followUp); }
      const text = data.response || 'No response.';
      appendMsg(text, false);
      renderCards(matchProductsFromText(text + ' ' + originalQuestion));
    }catch(e){
      console.error('followup failed', e);
      appendMsg('Thanks—saved your preference. Showing curated picks.', false);
      renderCards((catalog||[]).slice(0,6));
    }
  });
  document.getElementById('fuSkip').addEventListener('click', hideFollowUp);

  // cart
  function updateCartBadge(){
    const cnt = cart.reduce((n,it)=>n+it.qty,0);
    const el = $('#cartCount');
    if (cnt>0){ el.style.display='inline-flex'; el.textContent=String(cnt);} else { el.style.display='none'; }
  }
  function renderCart(){
    const wrap = $('#cartItems'); wrap.innerHTML='';
    let total = 0;
    cart.forEach(it=>{
      total += (it.price||0)*(it.qty||1);
      const row = document.createElement('div');
      row.className = 'item';
      row.innerHTML = `
        <img src="${imgFor(it)}" alt="" style="width:48px;height:48px;object-fit:cover;border-radius:8px;border:1px solid #eee"/>
        <div style="flex:1">
          <div class="name">${it.name}</div>
          <div class="qty">Qty: ${it.qty}</div>
        </div>
        <div class="price">${fmt(it.price)}</div>`;
      wrap.appendChild(row);
    });
    $('#cartTotal').textContent = fmt(total);
  }
  function addToCart(p){
    const ex = cart.find(x=>x.id===p.id);
    if (ex) ex.qty += 1; else cart.push({ id:p.id, name:p.name, price:p.price, image:p.image, category:p.category, qty:1 });
    localStorage.setItem('luminous_cart', JSON.stringify(cart));
    updateCartBadge();
  }
  function openDrawer(){ $('#drawer').classList.add('open'); renderCart(); }
  function closeDrawer(){ $('#drawer').classList.remove('open'); }
  $('#cartBtn').addEventListener('click', ()=>{ const d=$('#drawer'); d.classList.contains('open')?closeDrawer():openDrawer(); });

  // init
  (async function init(){
    updateCartBadge();
    await loadCatalog();
    appendMsg('Welcome. Ask anything or pick a concern. I’ll return tailored services and retail with clear prices.', false);
    if ((catalog||[]).length) renderCards(catalog.slice(0,4));
    const dupes = document.querySelectorAll('#composer');
    if (dupes.length > 1) { for (let i=1;i<dupes.length;i++){ dupes[i].remove(); } }
  })();

  // Listeners
  document.getElementById('askBtn').addEventListener('click', ()=>{
    const v = document.getElementById('askInput').value.trim();
    if (v){ askAdvisor(v); document.getElementById('askInput').value=''; }
  });
  document.getElementById('askInput').addEventListener('keydown', (e)=>{
    if (e.key === 'Enter'){ const v = e.target.value.trim(); if (v){ askAdvisor(v); e.target.value=''; } }
  });
})();
</script>
</body>
</html>
