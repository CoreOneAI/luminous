<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Luminous • Chat</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>
  :root{--charcoal:#2C2C2C;--gold:#B8860B;--pearl:#F8F8F8;--ink:#111;--muted:#666;--grad:linear-gradient(135deg,#B8860B,#DAA520)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--charcoal)}
  .page{max-width:960px;margin:0 auto;background:#fff;min-height:100vh;display:flex;flex-direction:column}
  header{position:sticky;top:0;background:#fff;border-bottom:1px solid #eee;z-index:10}
  .bar{display:flex;gap:12px;align-items:center;justify-content:space-between;padding:12px 16px}
  .brand{font-weight:800;letter-spacing:.3px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .status{font-size:12px;color:#555}
  .strip{display:flex;gap:8px;flex-wrap:wrap;padding:8px 16px;border-top:1px solid #f3f3f3}
  .pill{border:1px solid #e5e5e5;border-radius:999px;padding:8px 12px;font-size:12px;cursor:pointer;background:#fafafa}
  .pill.active{border-color:#f0d28a;background:#fff4da}
  .chat{flex:1;display:grid;grid-template-columns:1fr;gap:10px;padding:12px 16px;align-content:start}
  .msg{padding:10px 12px;border-radius:12px;max-width:80%}
  .bot{background:#f7f7f7;border:1px solid #eee}
  .you{background:#fff7e5;border:1px solid #ffe1a3;margin-left:auto}
  .composer{position:sticky;bottom:0;background:#fff;border-top:1px solid #eee;display:flex;gap:8px;padding:12px 16px}
  .composer input{flex:1;border:1px solid #e5e5e5;border-radius:12px;padding:10px 12px;font-size:14px}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:0 16px 80px}
  @media (max-width:900px){.grid{grid-template-columns:repeat(3,1fr)}}
  @media (max-width:680px){.grid{grid-template-columns:repeat(2,1fr)}}
  .card{border:1px solid #eee;border-radius:14px;overflow:hidden;background:#fff;display:flex;flex-direction:column}
  .ph{width:100%;aspect-ratio:1/1;object-fit:cover;background:#fafafa}
  .meta{padding:10px 12px}
  .name{font-size:13px;font-weight:700;color:#222;line-height:1.2;margin-bottom:6px}
  .sub{font-size:12px;color:#666;margin-bottom:10px}
  .price{font-weight:800;color:#B8860B;font-size:13px}
  .cta{margin-top:auto;padding:12px;border-top:1px solid #f2f2f2;display:flex;gap:8px}
  button{appearance:none;border:1px solid #e6e6e6;background:#fafafa;border-radius:12px;padding:10px 12px;font-weight:700;cursor:pointer;flex:1}
  .buy{background:linear-gradient(135deg,#B8860B,#DAA520);color:#fff;border:none}
  .nav{position:sticky;bottom:0;background:#fff;border-top:1px solid #eee;display:grid;grid-template-columns:repeat(4,1fr);height:56px;align-items:center}
  .nav a{text-align:center;text-decoration:none;color:#777;font-size:12px}
  .nav a.active{color:#B8860B;font-weight:800}
</style>
</head>
<body>
<div class="page">
  <header>
    <div class="bar">
      <div class="brand">Luminous Chat</div>
      <div class="status" id="status">Loading…</div>
    </div>
    <div class="strip">
      <div class="pill" data-q="purple shampoo">Purple Shampoo</div>
      <div class="pill" data-q="anti-frizz serum">Anti‑frizz Serum</div>
      <div class="pill" data-q="sensitive scalp shampoo">Sensitive Scalp</div>
      <div class="pill" data-q="bond repair mask">Bond Repair Mask</div>
    </div>
  </header>

  <section id="chat" class="chat" aria-live="polite">
    <div class="msg bot">Hi! Ask about routines, ingredients, or products. I’ll answer and show matching items below.</div>
  </section>

  <section id="grid" class="grid"></section>

  <div class="composer">
    <input id="q" placeholder="Ask a stylist… e.g., purple shampoo for brassiness"/>
    <button onclick="ask()">Ask</button>
  </div>

  <nav class="nav">
    <a href="/index.html">Home</a>
    <a href="#" onclick="location.href='/index.html';return false;">Book</a>
    <a href="/catalog.html">Shop</a>
    <a class="active" href="/chat.html">Chat</a>
  </nav>
</div>

<script>
const API_BASE='';
const PAGE=50;
let allItems=[];
let current=[];
let offset=0;

function fmtPrice(c){return Number.isFinite(c)?'$'+(c/100).toFixed(2):'$—';}
function pushMsg(text,who='bot'){
  const div=document.createElement('div');
  div.className='msg '+(who==='you'?'you':'bot');
  div.textContent=text;
  document.getElementById('chat').appendChild(div);
  div.scrollIntoView({behavior:'smooth',block:'end'});
}
function renderCard(it){
  const div=document.createElement('article');
  div.className='card';
  const img=it.image||'/images/wooden-tray.jpg';
  div.innerHTML=`
    <img class="ph" src="${img}" alt="${it.name||'Product'}" onerror="this.src='/images/wooden-tray.jpg'">
    <div class="meta">
      <div class="name">${it.name||'Unnamed'}</div>
      <div class="sub">${[it.brand||'—', it.category||'—'].filter(Boolean).join(' • ')}</div>
      <div class="price">${fmtPrice(it.price)}</div>
    </div>
    <div class="cta">
      <button class="buy" onclick='addToCart(${JSON.stringify(it).replace(/'/g,"&#39;")})'>Add to Cart</button>
    </div>`;
  document.getElementById('grid').appendChild(div);
}
function resetGrid(){ document.getElementById('grid').innerHTML=''; offset=0; }
function renderNext(){ const slice=current.slice(offset,offset+PAGE); slice.forEach(renderCard); offset+=slice.length; }
function tokens(s){return String(s).toLowerCase().split(/[^a-z0-9]+/).filter(Boolean);}
function score(item, toks){
  const name=(item.name||'').toLowerCase();
  const cat=(item.category||'').toLowerCase();
  let s=0; toks.forEach(t=>{ if(name.includes(t)) s+=3; if(cat.includes(t)) s+=2; });
  return s;
}
function rank(items,q){
  const toks=tokens(q);
  return items.map(x=>({x,s:score(x,toks)})).sort((a,b)=>b.s-a.s).map(o=>o.x);
}
async function ask(){
  const q=document.getElementById('q').value.trim();
  if(!q){ return; }
  pushMsg(q,'you');
  try{
    const r=await fetch(`${API_BASE}/api/chat`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:q})});
    const data=await r.json();
    pushMsg(data.response||'…','bot');
  }catch(e){
    pushMsg('Advisor temporarily unavailable. Quick tip: hydrate mid-lengths, use heat protectant, and book a gloss for shine.','bot');
  }
  // Always rank & show products (no 4-item cap)
  current = rank(allItems,q);
  resetGrid();
  renderNext(); // first 50
}

function addToCart(it){
  try{
    const raw=localStorage.getItem('luminous_cart');
    const cart=raw?JSON.parse(raw):[];
    cart.push({id:it.id,name:it.name,price:it.price||0,qty:1});
    localStorage.setItem('luminous_cart',JSON.stringify(cart));
    alert(`${it.name} added to cart.`);
  }catch(e){console.error(e);}
}

document.querySelectorAll('.pill').forEach(p=>p.addEventListener('click',()=>{
  const q=p.getAttribute('data-q'); document.getElementById('q').value=q; ask();
}));

async function boot(){
  try{
    const r=await fetch(`${API_BASE}/api/products?limit=5000`);
    const data=await r.json();
    allItems = Array.isArray(data.items)?data.items:[];
    document.getElementById('status').textContent = `API: ok ${allItems.length}`;
  }catch(e){
    try{
      const r2=await fetch('/data/products.json');
      const j=await r2.json();
      const arr=j.items||j.data||j.results||j.products||(Array.isArray(j)?j:[]);
      allItems = Array.isArray(arr)?arr:[];
      document.getElementById('status').textContent = `File: ok ${allItems.length}`;
    }catch(e2){
      document.getElementById('status').textContent = 'No products available';
    }
  }
}
boot();
</script>
</body>
</html>
