<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Luminous • Chat</title>
  <link rel="icon" href="/favicon.svg"/>
  <style>
    :root{--charcoal:#2C2C2C;--gold:#B8860B;--pearl:#F8F8F8;--ink:#111;--muted:#666;--grad:linear-gradient(135deg,#B8860B,#DAA520)}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--pearl);color:var(--ink)}
    header{position:sticky;top:0;z-index:5;background:#fff;border-bottom:1px solid #eee;padding:12px 14px;text-align:center}
    .brand{font-weight:800;font-size:18px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    main{max-width:820px;margin:0 auto;padding:12px 12px 96px;min-height:100vh}
    .msg{background:#fff;border:1px solid #eee;border-radius:14px;padding:12px;margin:8px 0}
    .me{background:#fffdf7;border-color:#f3e0b0}
    .bot{background:#f7f9ff;border-color:#cfdcff}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-top:10px}
    .card{background:#fff;border:1px solid #eee;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04)}
    .imgwrap{aspect-ratio:1/1;overflow:hidden;background:#fafafa}
    .imgwrap img{width:100%;height:100%;object-fit:cover;display:block}
    .pad{padding:10px 12px}
    .name{font-weight:800;font-size:14px}
    .meta{font-size:12px;color:#777;margin-top:4px}
    .price{margin-top:8px;font-weight:800;color:#B8860B}
    .dock{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:820px;padding:10px 12px;background:rgba(255,255,255,.9);backdrop-filter:blur(6px);border-top:1px solid #eee}
    .advisor{display:flex;gap:8px;align-items:center;background:#fff;border-radius:26px;padding:8px 10px;border:1.5px solid #e7d3a6;box-shadow:0 4px 12px rgba(0,0,0,.06)}
    .advisor input{flex:1;border:none;outline:none;font-size:14px;background:transparent;color:var(--ink)}
    .btn-send{border:none;width:42px;height:42px;border-radius:21px;background:var(--grad);color:#fff;font-weight:800;cursor:pointer}
    nav{position:fixed;left:50%;transform:translateX(-50%);bottom:56px;width:100%;max-width:820px;background:#fff;border-top:1px solid #e0e0e0;height:56px;display:grid;grid-template-columns:repeat(4,1fr);align-items:center}
    nav a{text-decoration:none;color:#777;font-size:12px;text-align:center}
    nav a.active{color:#B8860B;font-weight:700}
  </style>
</head>
<body>
  <header><div class="brand">Luminous Chat</div></header>
  <main id="thread">
    <div class="msg bot">Hi! Ask about routines, ingredients, or products. I’ll answer and show matching items below.</div>
  </main>

  <nav>
    <a href="/index.html">Home</a>
    <a href="/catalog.html">Shop</a>
    <a href="/chat.html" class="active">Chat</a>
    <a href="/account.html">Account</a>
  </nav>

  <div class="dock">
    <div class="advisor">
      <input id="q" placeholder="Ask e.g., sensitive scalp shampoo or purple shampoo"/>
      <button class="btn-send" id="send">Go</button>
    </div>
  </div>

<script>
const LIMIT = 12;
function money(c){ return '$' + ((c||0)/100).toFixed(2); }
function sanitizeImage(src){
  if(!src) return '/images/studio-beige.jpg';
  try{
    if(src.startsWith('/')) return src;
    if(src.startsWith('data:')||src.startsWith('blob:')) return src;
    if(src.includes('images.unsplash.com')||src.includes('plus.unsplash.com')) return src;
  }catch(e){}
  return '/images/studio-beige.jpg';
}
function cardHTML(it){
  const img = sanitizeImage(it.image||'');
  const sub = [it.brand||'—', it.category||'—'].filter(Boolean).join(' • ');
  return \`
  <article class="card" data-id="\${it.id}">
    <div class="imgwrap"><img src="\${img}" alt="\${(it.name||'Product').replace(/"/g,'&quot;')}" loading="lazy"/></div>
    <div class="pad">
      <div class="name">\${it.name||'Product'}</div>
      <div class="meta">\${sub||'—'}</div>
      <div class="price">\${money(it.price)}</div>
    </div>
  </article>\`;
}
function showMessage(html, cls='bot'){
  const m = document.createElement('div'); m.className = 'msg ' + cls; m.innerHTML = html;
  document.getElementById('thread').appendChild(m);
  window.scrollTo({ top: document.body.scrollHeight, behavior:'smooth' });
}
async function searchProducts(q){
  const url = new URL(location.origin + '/api/products');
  if(q) url.searchParams.set('q', q);
  url.searchParams.set('limit', String(LIMIT));
  const r = await fetch(url.toString(), { headers:{'Accept':'application/json'} });
  if(!r.ok) return [];
  const data = await r.json();
  return Array.isArray(data.items) ? data.items : [];
}
async function ask(){
  const input = document.getElementById('q');
  const q = (input.value||'').trim();
  if(!q) return;
  showMessage(q, 'me');
  try {
    const resp = await fetch('/api/chat', {
      method:'POST', headers:{'Content-Type':'application/json','Accept':'application/json'},
      body: JSON.stringify({ message:q })
    });
    const data = await resp.json();
    showMessage((data.response||'').replace(/\n/g,'<br/>'), 'bot');
  } catch(e){
    showMessage('Advisor temporarily unavailable. Quick tip: use color-safe shampoo and a weekly bond mask.', 'bot');
  }
  let items = [];
  try { items = await searchProducts(q); } catch(e){ items = []; }
  if(items.length === 0){
    showMessage('No matching products yet — try adding a brand or category word.', 'bot');
    return;
  }
  const grid = document.createElement('div'); grid.className = 'grid';
  grid.innerHTML = items.slice(0, LIMIT).map(cardHTML).join('');
  document.getElementById('thread').appendChild(grid);
  const href = '/catalog.html?q=' + encodeURIComponent(q);
  showMessage('See more results in <a href="'+href+'">Catalog</a>.', 'bot');
}
document.getElementById('send').addEventListener('click', ask);
document.getElementById('q').addEventListener('keydown', (e)=>{ if(e.key==='Enter') ask(); });
</script>
</body>
</html>
