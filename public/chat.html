<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Luminous • Chat</title>
<link rel="icon" href="/favicon.svg"/>
<style>
:root{--charcoal:#2C2C2C;--gold:#B8860B;--pearl:#F8F8F8;--ink:#111;--muted:#666;--grad:linear-gradient(135deg,#B8860B,#DAA520)}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--pearl);color:var(--ink)}
.page{max-width:414px;margin:0 auto;min-height:100vh;background:var(--pearl)}
.header{background:#fff;padding:14px 16px;border-bottom:1px solid #eee;position:sticky;top:0;z-index:5;text-align:center}
.brand{font-weight:800;font-size:18px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.main{padding:12px 12px 96px}
.msg{background:#fff;border:1px solid #EEE;border-radius:14px;padding:12px;margin:8px 0}
.me{background:#fffdf7;border-color:#f3e0b0}
.bot{background:#f6f8ff;border-color:#dbe5ff}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:10px}
.card{background:#fff;border:1px solid #EEE;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.imgwrap{aspect-ratio:1/1;overflow:hidden;background:#fafafa}
.imgwrap img{width:100%;height:100%;object-fit:cover;display:block}
.pad{padding:10px 12px}
.name{font-weight:800;font-size:14px}
.meta{font-size:11px;color:#777;margin-top:4px}
.price{margin-top:8px;font-weight:800;color:var(--gold)}
.nav{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:414px;background:#fff;border-top:1px solid #E0E0E0;height:56px;display:grid;grid-template-columns:repeat(4,1fr);align-items:center}
.nav a{text-decoration:none;color:#777;font-size:12px;text-align:center}
.nav a.active{color:var(--gold);font-weight:700}
.dock{position:fixed;left:50%;transform:translateX(-50%);bottom:56px;width:100%;max-width:414px;padding:10px 12px;background:rgba(255,255,255,.9);backdrop-filter:blur(6px);border-top:1px solid #eee}
.advisor{display:flex;gap:8px;align-items:center;background:#fff;border-radius:26px;padding:8px 10px;border:1.5px solid #e7d3a6;box-shadow:0 4px 12px rgba(0,0,0,.06)}
.advisor input{flex:1;border:none;outline:none;font-size:14px;background:transparent;color:var(--ink)}
.advisor button{border:none;width:42px;height:42px;border-radius:21px;background:var(--grad);color:#fff;font-weight:800;cursor:pointer}
</style>
</head>
<body>
<div class="page">
  <header class="header">
    <div class="brand">Luminous Chat</div>
  </header>
  <main id="thread" class="main">
    <div class="msg bot">Hi! Ask about routines, ingredients, or products. I’ll answer and show matching items below.</div>
  </main>

  <nav class="nav">
    <a href="/index.html">Home</a>
    <a href="/catalog.html">Shop</a>
    <a href="/chat.html" class="active">Chat</a>
    <a href="/account.html">Account</a>
  </nav>

  <div class="dock">
    <div class="advisor">
      <input id="q" placeholder="Ask e.g., sensitive scalp shampoo"/>
      <button id="send">Go</button>
    </div>
  </div>
</div>
<script>
const LIMIT = 12;
function money(c){return '$'+((c||0)/100).toFixed(2)}
function sanitizeImage(src){
  if(!src) return '/images/studio-beige.jpg';
  try{
    if(src.startsWith('/')) return src;
    if(src.startsWith('data:')||src.startsWith('blob:')) return src;
    if(src.includes('images.unsplash.com')||src.includes('plus.unsplash.com')) return src;
  }catch(e){}
  return '/images/studio-beige.jpg';
}
function card(it){
  const sub = [it.brand||'—', it.category||'—'].filter(Boolean).join(' • ');
  return \`
  <article class="card">
    <div class="imgwrap"><img src="\${sanitizeImage(it.image)}" alt="\${(it.name||'Product').replace(/"/g,'&quot;')}" loading="lazy"/></div>
    <div class="pad">
      <div class="name">\${it.name||'Product'}</div>
      <div class="meta">\${sub||'—'}</div>
      <div class="price">\${money(it.price)}</div>
    </div>
  </article>\`;
}
function show(html, cls='bot'){
  const m = document.createElement('div'); m.className='msg '+cls; m.innerHTML=html;
  document.getElementById('thread').appendChild(m);
  window.scrollTo({ top: document.body.scrollHeight, behavior:'smooth' });
}
async function ask(){
  const q = (document.getElementById('q').value||'').trim();
  if(!q) return;
  show(q,'me');
  try{
    const r = await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify({message:q})});
    const data = await r.json();
    show((data.response||'').replace(/\n/g,'<br/>'),'bot');
  }catch(e){ show('Advisor temporarily unavailable. Try catalog search.','bot'); }
  // products
  try{
    const url = new URL(location.origin + '/api/products');
    url.searchParams.set('q', q);
    url.searchParams.set('limit', LIMIT);
    const r = await fetch(url,{headers:{'Accept':'application/json'}});
    const data = await r.json();
    const items = Array.isArray(data.items)?data.items:[];
    if(items.length){
      const grid = document.createElement('div'); grid.className='grid';
      grid.innerHTML = items.map(card).join('');
      document.getElementById('thread').appendChild(grid);
      show('See more in <a href="/catalog.html?q='+encodeURIComponent(q)+'">Catalog</a>.','bot');
    } else {
      show('No matching products yet — try a brand or a category word.','bot');
    }
  }catch(e){ show('Could not load products.','bot'); }
}
document.getElementById('send').addEventListener('click', ask);
document.getElementById('q').addEventListener('keydown', e=>{ if(e.key==='Enter') ask(); });
</script>
</body>
</html>
