<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Luminous • Chat</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>

*{margin:0;padding:0;box-sizing:border-box}
:root{--charcoal:#2C2C2C;--gold:#B8860B;--pearl:#F8F8F8;--ink:#111;--muted:#666;--grad:linear-gradient(135deg,#B8860B,#DAA520)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--charcoal);color:var(--ink)}
.page{max-width:414px;margin:0 auto;min-height:100vh;background:var(--pearl);padding-bottom:120px}
.header{background:#fff;padding:16px;border-bottom:1px solid #eee;position:sticky;top:0;z-index:5}
.brand{font-weight:800;font-size:18px;letter-spacing:.3px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:414px;background:#fff;border-top:1px solid #E0E0E0;height:60px;display:grid;grid-template-columns:repeat(4,1fr);align-items:center;z-index:10}
.nav a{text-decoration:none;color:#777;font-size:11px;text-align:center}
.nav a.active{color:var(--gold);font-weight:700}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}
.card{background:#fff;border:1px solid #eee;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card img{width:100%;height:120px;object-fit:cover;background:#f6f6f6}
.card .meta{padding:10px 10px 12px}
.card .name{font-size:12px;font-weight:700;line-height:1.2;min-height:28px}
.card .brandx{font-size:11px;color:#777;margin-top:4px}
.card .row{margin-top:8px;display:flex;justify-content:space-between;align-items:center}
.price{font-size:12px;font-weight:800;color:var(--gold)}
.btn{border:none;border-radius:18px;padding:8px 10px;font-weight:800;letter-spacing:.2px;color:#fff;background:var(--grad);cursor:pointer;font-size:12px}
.badge{min-width:18px;height:18px;background:var(--gold);color:#fff;border-radius:9px;font-size:10px;display:none;align-items:center;justify-content:center;padding:0 5px}
.headerbar{display:flex;align-items:center;justify-content:space-between}
.iconbtn{border:1px solid #e6e6e6;border-radius:12px;background:#fafafa;padding:6px 10px;cursor:pointer;display:flex;align-items:center;gap:8px}
.svg{width:16px;height:16px;display:inline-block}
.composer{position:fixed;left:50%;transform:translateX(-50%);bottom:60px;max-width:414px;width:100%;padding:10px 12px}
.composer .box{display:flex;gap:8px;align-items:center;background:#fff;border-radius:26px;padding:8px 10px;border:1.5px solid #e7d3a6;box-shadow:0 4px 12px rgba(0,0,0,.06)}
.composer input{flex:1;border:none;outline:none;font-size:13px;background:transparent;color:var(--ink)}
.composer .btn-send{border:none;width:40px;height:36px;border-radius:18px;background:var(--grad);color:#fff;font-weight:800;cursor:pointer}
.drawer{position:fixed;right:-320px;top:0;width:320px;height:100vh;background:#fff;border-left:1px solid #eee;box-shadow:-4px 0 16px rgba(0,0,0,.12);transition:right .25s ease;z-index:20;padding:12px}
.drawer.open{right:0}
.drawer h3{font-size:14px}
.drawer .item{display:flex;gap:8px;align-items:center;border-bottom:1px solid #f0f0f0;padding:8px 0}
.drawer .name{font-size:12px;font-weight:700}
.drawer .qty{font-size:12px;color:#555}
.drawer .total{margin-top:8px;font-weight:800}

.main{padding:12px}
.thread{background:#fff;border:1px solid #eee;border-radius:12px;padding:12px;max-height:220px;overflow:auto}
.msg{font-size:12px;line-height:1.35;margin:6px 0}
.msg.me{text-align:right}
.followup{margin-top:8px;display:flex;gap:8px}
.followup input{flex:1;border:1px solid #E6E6E6;border-radius:12px;padding:8px;font-size:12px}
.note{font-size:12px;color:#666;margin:8px 0}
.more{display:block;width:100%;margin:14px 0 0;border:1px solid #e6e6e6;background:#fff;color:#333;border-radius:16px;padding:10px;font-weight:700}
</style>
</head>
<body>
<div class="page">
  <header class="header">
    <div class="headerbar">
      <div class="brand">Luminous • Chat</div>
      <button class="iconbtn" id="cartBtn" title="Cart">
        <svg class="svg" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1.5"><path d="M6 6h15l-1.5 9h-12z"/><circle cx="9" cy="20" r="1.5"/><circle cx="17" cy="20" r="1.5"/></svg>
        <span class="badge" id="cartCount">0</span>
      </button>
    </div>
  </header>

  <main class="main">
    <div class="thread" id="thread" aria-live="polite">
      <div class="msg">Hi! Ask about routines, ingredients, or products. I’ll answer and show matching items below.</div>
    </div>
    <div id="follow" class="followup" style="display:none"></div>
    <div class="note" id="note"></div>
    <div id="grid" class="grid"></div>
    <button id="moreBtn" class="more" style="display:none">Show 50 more</button>
  </main>

  <div class="composer">
    <div class="box">
      <input id="ask" placeholder="e.g., best for acne • purple shampoo for brassy highlights">
      <button class="btn-send" id="askBtn">Go</button>
    </div>
  </div>

  <nav class="nav">
    <a href="/index.html">Home</a>
    <a href="#" onclick="location.href='/index.html#book';return false;">Book</a>
    <a href="/catalog.html">Shop</a>
    <a class="active" href="/chat.html">Chat</a>
  </nav>
</div>

<div class="drawer" id="drawer"><h3>Your Cart</h3><div id="cartItems"></div><div class="total" id="cartTotal">$0.00</div></div>

<script>
(function(){
  const API_BASE='';
  const BATCH=50;
  let all=[]; let filtered=[]; let cursor=0;
  let cart = JSON.parse(localStorage.getItem('luminous_cart')||'[]');
  let lastQuestion=''; let pendingFollow=null;

  const FALLBACKS = {
    antiaging:'/images/zen-stone-serum.jpg',
    hydration:'/images/spa-salts.jpg',
    colorcare:'/images/studio-beige.jpg',
    nails:'/images/wooden-tray.jpg',
    hair:'/images/hero-almonds.jpg',
    kbeauty:'/images/zen-stone-serum.jpg',
    mens:'/images/mens-kit-1.jpg',
    'default':'/images/studio-beige.jpg'
  };

  const $ = (s)=>document.querySelector(s);
  const thread=$('#thread'), grid=$('#grid'), note=$('#note'), moreBtn=document.getElementById('moreBtn');

  function cents(v){
    if(v===null||v===undefined) return 0;
    if(typeof v==='number') return v>=0 && v<1 ? Math.round(v*100) : (Number.isInteger(v)?v:Math.round(v*100));
    if(typeof v==='string'){ const m=v.replace(/[, $]/g,'').match(/(\d+(\.\d+)?)/); if(!m) return 0; return Math.round(parseFloat(m[1])*100); }
    return 0;
  }
  const fmt = v => '$' + (cents(v)/100).toFixed(2);

  function imgFor(p){
    const im = p.image || p.image_url || p.photo || '';
    const cat = (p.category||'').toLowerCase();
    const key = cat.includes('men')?'mens':cat.includes('nail')?'nails':cat.includes('color')?'colorcare':cat.includes('anti')?'antiaging':(cat.includes('k-beauty')||cat.includes('kbeauty'))?'kbeauty':cat.includes('hair')?'hair':cat.includes('hydrat')?'hydration':'default';
    const fb = FALLBACKS[key];
    if(!im) return fb;
    if(/^https?:\/\//i.test(im)) return im;
    return '/' + encodeURI(String(im).replace(/^\/+/,''));
  }

  function addMsg(text,me=false){
    const div=document.createElement('div'); div.className='msg'+(me?' me':''); div.textContent=text; thread.appendChild(div); thread.scrollTop=thread.scrollHeight;
  }

  function updateCartBadge(){
    const cnt = cart.reduce((n,it)=>n+(it.qty||0),0);
    const el = document.getElementById('cartCount');
    if(cnt>0){ el.style.display='inline-flex'; el.textContent=String(cnt); }
    else { el.style.display='none'; }
  }
  function renderCart(){
    const wrap=document.getElementById('cartItems'); wrap.innerHTML='';
    let total=0;
    cart.forEach(it=>{
      total += cents(it.price)*(it.qty||1);
      const row=document.createElement('div'); row.className='item';
      const imgSrc=imgFor(it);
      row.innerHTML = '<img src="'+imgSrc+'" alt="" style="width:48px;height:48px;object-fit:cover;border-radius:8px;border:1px solid #eee" onerror="this.onerror=null;this.src=\''+FALLBACKS['default']+'\'"/>'
        + '<div style="flex:1"><div class="name">'+it.name+'</div><div class="qty">Qty: '+it.qty+'</div></div>'
        + '<div class="price">'+fmt(it.price)+'</div>';
      wrap.appendChild(row);
    });
    document.getElementById('cartTotal').textContent = fmt(total);
  }
  function addToCart(p){
    const priceC=cents(p.price);
    const found=cart.find(x=>x.id===p.id);
    if(found) found.qty += 1; else cart.push({id:p.id,name:p.name,price:priceC,image:p.image||imgFor(p),category:p.category,qty:1});
    localStorage.setItem('luminous_cart', JSON.stringify(cart)); updateCartBadge();
  }
  document.getElementById('cartBtn').addEventListener('click', ()=>{
    const d=document.getElementById('drawer'); d.classList.contains('open') ? d.classList.remove('open') : (d.classList.add('open'), renderCart());
  });

  function card(p){
    const d=document.createElement('div'); d.className='card';
    const src=imgFor(p);
    d.innerHTML = '<img src="'+src+'" alt="" onerror="this.onerror=null;this.src=\''+FALLBACKS['default']+'\'"/>'
      + '<div class="meta"><div class="name">'+(p.name||'')+'</div><div class="brandx">'+(p.brand||p.category||'')+'</div>'
      + '<div class="row"><div class="price">'+fmt(p.price)+'</div><button class="btn" data-id="'+p.id+'">Add</button></div></div>';
    d.addEventListener('click', (e)=>{
      const b=e.target.closest('.btn'); if(!b) return;
      const item = filtered.find(x=>x.id===b.getAttribute('data-id'));
      if(item) addToCart(item);
    });
    return d;
  }

  function renderChunk(reset=false){
    if(reset){ grid.innerHTML=''; cursor=0; }
    const next=filtered.slice(cursor, cursor+BATCH);
    next.forEach(p=>grid.appendChild(card(p)));
    cursor += next.length;
    document.getElementById('moreBtn').style.display = cursor < filtered.length ? 'block' : 'none';
    note.textContent = filtered.length ? (filtered.length+' products • showing '+cursor) : 'No matching products yet — try a different term.';
  }

  function normalize(p){
    return { id:p.id||p.sku||p._id||String(Math.random()).slice(2),
      name:p.name||p.title||'Unnamed',
      brand:p.brand||p.maker||'',
      category:p.category||p.type||'',
      price:cents(p.price),
      image:p.image||p.image_url||p.photo||''
    };
  }

  async function loadProducts(){
    try{
      const r=await fetch(API_BASE+'/api/products',{cache:'no-store'});
      const j=await r.json();
      const items = Array.isArray(j.items) ? j.items : (Array.isArray(j)?j:[]);
      all = items.map(normalize);
      filtered = all.slice();
      renderChunk(true);
    }catch(e){
      console.error('loadProducts', e);
      all=[]; filtered=[]; renderChunk(true);
    }
  }

  // Ask flow with follow-up support
  async function ask(q, ctx={}){
    if(!q) return;
    lastQuestion=q;
    addMsg(q, true);
    try{
      const r = await fetch(API_BASE+'/api/chat', {method:'POST', headers:{'Content-Type':'application/json','Accept':'application/json'}, body: JSON.stringify(Object.assign({message:q}, ctx))});
      const data = await r.json();
      if(data.response) addMsg(data.response);
      if(data.followUp && data.followUp.question){ showFollow(data.followUp); }
      const words = (q+' '+(data.response||'')).toLowerCase().split(/[^a-z0-9]+/).filter(w=>w.length>3);
      filtered = all.filter(p => words.some(w => (p.name||'').toLowerCase().includes(w) || (p.category||'').toLowerCase().includes(w) || (p.brand||'').toLowerCase().includes(w)));
      if(filtered.length<1) filtered = all.slice(0, Math.max(50, all.length));
      renderChunk(true);
    }catch(e){
      console.error('chat error', e);
      addMsg('Advisor temporarily unavailable. Quick tip: hydrate mid-lengths, use heat protectant, and book a gloss for shine.');
    }
  }

  function showFollow(fu){
    pendingFollow = fu;
    const box = document.getElementById('follow'); box.style.display='flex'; box.innerHTML='';
    const input=document.createElement('input'); input.placeholder = fu.question;
    const btn=document.createElement('button'); btn.className='btn'; btn.textContent='Reply';
    btn.onclick = ()=>{ const answer=(input.value||'').trim(); if(!answer) return; box.style.display='none'; ask(lastQuestion+'\n'+fu.key+': '+answer); };
    box.append(input, btn);
  }

  document.getElementById('askBtn').addEventListener('click', ()=>{ const v=document.getElementById('ask').value.trim(); if(v) ask(v); });
  document.getElementById('ask').addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ const v=e.target.value.trim(); if(v) ask(v); }});
  document.getElementById('moreBtn').addEventListener('click', ()=>renderChunk(false));

  updateCartBadge();
  loadProducts();
})();
</script>
</body>
</html>
