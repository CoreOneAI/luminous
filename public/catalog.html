<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Luminous • Catalog</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>
  :root{--charcoal:#2C2C2C;--gold:#B8860B;--pearl:#F8F8F8;--ink:#111;--muted:#666;--grad:linear-gradient(135deg,#B8860B,#DAA520)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--charcoal)}
  .page{max-width:960px;margin:0 auto;background:#fff;min-height:100vh}
  header{position:sticky;top:0;background:#fff;border-bottom:1px solid #eee;z-index:10}
  .bar{display:flex;gap:12px;align-items:center;justify-content:space-between;padding:12px 16px}
  .brand{font-weight:800;letter-spacing:.3px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .status{font-size:12px;color:#555}
  .search{display:flex;gap:8px;align-items:center;padding:12px 16px;border-top:1px solid #f3f3f3}
  .search input{flex:1;border:1px solid #e5e5e5;border-radius:12px;padding:10px 12px;font-size:14px}
  .filters{display:flex;flex-wrap:wrap;gap:8px;padding:8px 16px 0 16px}
  .pill{border:1px solid #e5e5e5;border-radius:999px;padding:8px 12px;font-size:12px;cursor:pointer;background:#fafafa}
  .pill.active{border-color:#f0d28a;background:#fff4da}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:16px}
  @media (max-width:900px){.grid{grid-template-columns:repeat(3,1fr)}}
  @media (max-width:680px){.grid{grid-template-columns:repeat(2,1fr)}}
  .card{border:1px solid #eee;border-radius:14px;overflow:hidden;background:#fff;display:flex;flex-direction:column}
  .ph{width:100%;aspect-ratio:1/1;object-fit:cover;background:#fafafa}
  .meta{padding:10px 12px}
  .name{font-size:13px;font-weight:700;color:#222;line-height:1.2;margin-bottom:6px}
  .sub{font-size:12px;color:#666;margin-bottom:10px}
  .price{font-weight:800;color:#B8860B;font-size:13px}
  .cta{margin-top:auto;padding:12px;border-top:1px solid #f2f2f2;display:flex;gap:8px}
  button{appearance:none;border:1px solid #e6e6e6;background:#fafafa;border-radius:12px;padding:10px 12px;font-weight:700;cursor:pointer;flex:1}
  .buy{background:linear-gradient(135deg,#B8860B,#DAA520);color:#fff;border:none}
  .more{display:block;margin:0 auto 40px auto;border:none;background:linear-gradient(135deg,#B8860B,#DAA520);color:#fff;border-radius:24px;padding:12px 18px;font-weight:800}
  .nav{position:sticky;bottom:0;background:#fff;border-top:1px solid #eee;display:grid;grid-template-columns:repeat(4,1fr);height:56px;align-items:center}
  .nav a{text-align:center;text-decoration:none;color:#777;font-size:12px}
  .nav a.active{color:#B8860B;font-weight:800}
  .note{padding:8px 16px;color:#555;font-size:12px}
</style>
</head>
<body>
<div class="page">
  <header>
    <div class="bar">
      <div class="brand">Luminous Catalog</div>
      <div class="status" id="status">Loading…</div>
    </div>
    <div class="search">
      <input id="q" placeholder="Search products or concerns (e.g., purple shampoo, anti-frizz serum, sensitive scalp)"/>
      <button onclick="runSearch()">Search</button>
    </div>
    <div class="filters">
      <div class="pill" data-k="Hair" onclick="toggleFacet(this)">Hair</div>
      <div class="pill" data-k="Skin" onclick="toggleFacet(this)">Skin</div>
      <div class="pill" data-k="Nail" onclick="toggleFacet(this)">Nail</div>
      <div class="pill" data-k="Shampoo" onclick="toggleFacet(this)">Shampoo</div>
      <div class="pill" data-k="Conditioner" onclick="toggleFacet(this)">Conditioner</div>
      <div class="pill" data-k="Mask" onclick="toggleFacet(this)">Mask</div>
      <div class="pill" data-k="Serum" onclick="toggleFacet(this)">Serum</div>
      <div class="pill" data-k="Spray" onclick="toggleFacet(this)">Spray</div>
      <div class="pill" data-k="Purple" onclick="toggleFacet(this)">Purple</div>
      <div class="pill" data-k="Blue" onclick="toggleFacet(this)">Blue</div>
      <div class="pill" data-k="Red" onclick="toggleFacet(this)">Red</div>
      <div class="pill" data-k="Copper" onclick="toggleFacet(this)">Copper</div>
    </div>
  </header>

  <div class="note">Showing best matches. Use pills to refine and “Show more” to load the next 50.</div>
  <section id="grid" class="grid" aria-live="polite"></section>
  <div style="padding:0 16px 32px">
    <button id="moreBtn" class="more" style="display:none" onclick="renderNext()">Show 50 more</button>
  </div>

  <nav class="nav">
    <a href="/index.html">Home</a>
    <a href="#" onclick="location.href='/index.html';return false;">Book</a>
    <a class="active" href="/catalog.html">Shop</a>
    <a href="/chat.html">Chat</a>
  </nav>
</div>

<script>
const API_BASE = '';
const PAGE = 50;
let allItems = [];
let filtered = [];
let offset = 0;
let activePills = new Set();
let apiSource = '';

function toCents(v){
  if (typeof v === 'number' && Number.isFinite(v)) return Math.round(v);
  if (typeof v === 'string'){
    const m=v.match(/([\d.,]+)/); if(m){ const n=Number(m[1].replace(/,/g,'')); if(Number.isFinite(n)) return n<1000?Math.round(n*100):Math.round(n); }
  }
  return 0;
}
function normalize(list){
  return list.map((x,i)=>{
    const id = x.id || x.sku || `sku-${String(i+1).padStart(4,'0')}`;
    const name = x.name || x.title || 'Unnamed';
    const brand = x.brand || x.maker || 'Salon';
    const category = x.category || x.type || '—';
    const price = toCents(x.price ?? x.price_cents ?? x.priceCents ?? x.cost);
    const image = x.image || x.img || x.photo || '/images/wooden-tray.jpg';
    return { id, name, brand, category, price, image };
  });
}

function fmtPrice(cents){ return '$'+(Number(cents||0)/100).toFixed(2); }
function status(s){ document.getElementById('status').textContent = s; }

function deriveTags(item){
  const t = [];
  const name = (item.name||'').toLowerCase();
  const cat = (item.category||'').toLowerCase();
  if (/hair/.test(cat)) t.push('Hair');
  if (/skin/.test(cat)) t.push('Skin');
  if (/nail/.test(cat)) t.push('Nail');
  if (/shampoo/.test(cat)||/shampoo/.test(name)) t.push('Shampoo');
  if (/conditioner/.test(cat)||/conditioner/.test(name)) t.push('Conditioner');
  if (/mask/.test(cat)||/mask/.test(name)) t.push('Mask');
  if (/serum/.test(cat)||/serum/.test(name)) t.push('Serum');
  if (/spray/.test(cat)||/spray/.test(name)) t.push('Spray');
  if (/purple/.test(name)) t.push('Purple');
  if (/blue/.test(name)) t.push('Blue');
  if (/red/.test(name)) t.push('Red');
  if (/copper/.test(name)) t.push('Copper');
  return t;
}

function score(item, qTokens){
  const name = (item.name||'').toLowerCase();
  const cat = (item.category||'').toLowerCase();
  let s = 0;
  qTokens.forEach(t=>{
    if (name.includes(t)) s+=3;
    if (cat.includes(t)) s+=2;
  });
  activePills.forEach(p=>{ if(deriveTags(item).includes(p)) s+=2; });
  return s;
}

function renderCard(it){
  const div = document.createElement('article');
  div.className = 'card';
  const imgSrc = it.image || '/images/wooden-tray.jpg';
  div.innerHTML = `
    <img class="ph" src="${imgSrc}" alt="${(it.name||'Product')}" onerror="this.src='/images/wooden-tray.jpg'">
    <div class="meta">
      <div class="name">${it.name||'Unnamed'}</div>
      <div class="sub">${[it.brand||'—', it.category||'—'].filter(Boolean).join(' • ')}</div>
      <div class="price">${fmtPrice(it.price)}</div>
    </div>
    <div class="cta">
      <button onclick='addToCart(${JSON.stringify(it).replace(/'/g,"&#39;")})' class="buy">Add to Cart</button>
    </div>`;
  document.getElementById('grid').appendChild(div);
}

function resetGrid(){
  document.getElementById('grid').innerHTML='';
  offset=0;
}

function renderNext(){
  const slice = filtered.slice(offset, offset+PAGE);
  slice.forEach(renderCard);
  offset += slice.length;
  document.getElementById('moreBtn').style.display = (offset < filtered.length) ? 'block' : 'none';
  status(`Source: ${apiSource||'n/a'} • Showing ${Math.min(offset, filtered.length)} of ${filtered.length} • Cached: ${allItems.length}`);
}

function runSearch(){
  const q = (document.getElementById('q').value||'').trim().toLowerCase();
  const base = [...allItems];
  let out = base;
  if (q){
    const tokens = q.split(/[^a-z0-9]+/).filter(Boolean);
    out = base.map(x => ({ x, s: score(x, tokens) }))
              .sort((a,b)=>b.s-a.s)
              .map(o=>o.x);
  }
  if (activePills.size){
    out = out.filter(it => {
      const tags = deriveTags(it);
      for (const p of activePills) if (!tags.includes(p)) return false;
      return true;
    });
  }
  filtered = out;
  resetGrid();
  renderNext();
}

function toggleFacet(el){
  const key = el.getAttribute('data-k');
  if (el.classList.contains('active')){
    el.classList.remove('active'); activePills.delete(key);
  } else { el.classList.add('active'); activePills.add(key); }
  runSearch();
}

function addToCart(it){
  try{
    const raw = localStorage.getItem('luminous_cart');
    const cart = raw ? JSON.parse(raw) : [];
    cart.push({ id: it.id, name: it.name, price: it.price||0, qty:1 });
    localStorage.setItem('luminous_cart', JSON.stringify(cart));
    alert(`${it.name} added to cart.`);
  }catch(e){ console.error(e); }
}

async function fetchBest(){
  let api = { items: [], source: '' };
  try{
    const r = await fetch(`${API_BASE}/api/products?limit=5000`);
    const d = await r.json();
    api.items = Array.isArray(d.items) ? d.items : [];
    api.source = d.source || 'api';
  }catch(e){ /* ignore */ }

  let file = { items: [], source: '' };
  try{
    const r2 = await fetch('/data/products.json');
    const j = await r2.json();
    const arr = j.items || j.data || j.results || j.products || (Array.isArray(j)?j:[]);
    file.items = Array.isArray(arr)?arr:[];
    file.source = '/data/products.json';
  }catch(e){ /* ignore */ }

  // Prefer the larger set (fixes "only 4 items" when API points at stub)
  let chosen = api;
  if (file.items.length > api.items.length) chosen = file;

  return { items: normalize(chosen.items), source: chosen.source };
}

async function boot(){
  const best = await fetchBest();
  allItems = best.items;
  apiSource = best.source;
  filtered = [...allItems];
  renderNext(); // first 50
}
boot();
</script>
</body>
</html>
