<!DOCTYPE html><html lang='en'><head>
<meta charset='UTF-8'/><meta name='viewport' content='width=device-width, initial-scale=1.0'/>
<title>Catalog — Luminous</title>

<style>
*{box-sizing:border-box}body{margin:0;background:#111;color:#111;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
.page{max-width:414px;margin:0 auto;background:#f7f7f7;min-height:100vh;padding-bottom:80px}
.header{position:sticky;top:0;background:#222;color:#fff;padding:12px 14px;border-bottom:1px solid #333;z-index:5;text-align:center}
.brand{font-weight:800;letter-spacing:.3px;font-size:16px}
.main{padding:10px}
.search{display:flex;gap:8px;margin:8px 0}
input[type=search]{flex:1;border:1px solid #e6e6e6;background:#fff;border-radius:12px;padding:10px 12px;font-size:14px;outline:none}
button{border:none;background:linear-gradient(135deg,#B8860B,#DAA520);color:#fff;border-radius:12px;padding:10px 14px;font-weight:800;cursor:pointer}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.card{background:#fff;border:1px solid #eee;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card .photo{width:100%;height:120px;object-fit:cover;display:block;background:#f3f3f3}
.card .name{font-weight:800;font-size:13px;margin:8px 10px 2px 10px;color:#111}
.card .sub{font-size:11px;color:#666;margin:0 10px 8px 10px}
.card .row{display:flex;align-items:center;justify-content:space-between;padding:8px 10px 10px 10px}
.card .price{font-weight:800;color:#B8860B;font-size:13px}
.card .add{background:#111;color:#fff;border-radius:10px;padding:8px 10px;font-weight:800}
.meta{font-size:11px;color:#666;margin-top:6px;text-align:center}
.nav{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:414px;background:#fff;border-top:1px solid #e0e0e0;height:50px;display:grid;grid-template-columns:repeat(4,1fr);align-items:center}
.nav a{text-decoration:none;color:#666;text-align:center;font-size:12px;padding-top:4px}
.nav a.active{color:#B8860B;font-weight:800}
@media (max-width:380px){.grid{grid-template-columns:1fr}}
</style>

</head><body><div class='page'>
  <header class='header'><div class='brand'>Luminous • Catalog</div></header>
  <main class='main'>
    <div class='search'><input id='q' type='search' placeholder='Search products…'/><button id='go'>Search</button></div>
    <div id='meta' class='meta'></div>
    <div id='grid' class='grid'></div>
    <div id='moreRow' class='meta' style='display:none;'><button id='moreBtn'>Show more</button></div>
  </main>
  <nav class='nav'><a href='/index.html'>Home</a><a class='active' href='/catalog.html'>Shop</a><a href='/chat.html'>Chat</a><a href='/account.html'>Account</a></nav>
</div>

<script>
const API_BASE = ''; // same-origin
function money(cents){ return (typeof cents==='number' && cents>=0) ? `$${(cents/100).toFixed(2)}` : '$—'; }
function imgOrFallback(src){
  if (!src) return 'placeholder.png';
  try {
    const u = new URL(src, location.href);
    return u.pathname.startsWith('/images/') ? u.href : src;
  } catch { return 'placeholder.png'; }
}
function productCard(p){
  const sub = [p.brand||'—', p.category||'—'].filter(Boolean).join(' • ');
  return `<article class="card">
    <img class="photo" alt="${(p.name||'Product').replace(/"/g,'&quot;')}" src="${imgOrFallback(p.image)}" loading="lazy" onerror="this.src='placeholder.png'"/>
    <div class="name">${p.name||'Product'}</div>
    <div class="sub">${sub}</div>
    <div class="row">
      <div class="price">${money(p.price)}</div>
      <button class="add">Add</button>
    </div>
  </article>`;
}
async function fetchProducts(q, limit=24, offset=0){
  const url = `${API_BASE}/api/products?` + new URLSearchParams({ q:q||'', limit:String(limit), offset:String(offset) });
  const r = await fetch(url, { headers: { 'Accept':'application/json' } });
  if (!r.ok) throw new Error('products http '+r.status);
  const j = await r.json();
  if (!j || !Array.isArray(j.items)) throw new Error('bad products payload');
  return j;
}
</script>

<script>
let lastQ = ''; let offset = 0; let total = 0;

async function search(reset){
  if(reset){ document.getElementById('grid').innerHTML=''; offset=0; }
  const q = document.getElementById('q').value.trim(); lastQ=q;
  let data;
  try { data = await fetchProducts(q, 24, offset); }
  catch(e) { document.getElementById('meta').textContent='No products available.'; return; }
  total = data.total||0;
  document.getElementById('meta').textContent = `${data.items.length} products • showing ${offset + data.items.length} of ${total}`;
  const frag = document.createElement('div');
  data.items.forEach(p => { frag.insertAdjacentHTML('beforeend', productCard(p)); });
  document.getElementById('grid').appendChild(frag);
  offset += data.items.length;
  document.getElementById('moreRow').style.display = (offset < total) ? 'block' : 'none';
}

document.getElementById('go').addEventListener('click', ()=>search(true));
document.getElementById('q').addEventListener('keydown', (e)=>{ if(e.key==='Enter') search(true); });
document.getElementById('moreBtn').addEventListener('click', ()=>search(false));

search(true);
</script>
</body></html>
