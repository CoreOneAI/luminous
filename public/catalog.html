<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Luminous • Catalog</title>
  <link rel="icon" href="/favicon.svg"/>
  <style>
    :root{--charcoal:#2C2C2C;--gold:#B8860B;--pearl:#F8F8F8;--ink:#111;--muted:#666;--grad:linear-gradient(135deg,#B8860B,#DAA520)}
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f6f6f6;color:#111}
    header{position:sticky;top:0;z-index:5;background:#fff;border-bottom:1px solid #eee;padding:12px 14px}
    .brand{font-weight:800;font-size:18px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .toolbar{display:flex;gap:8px;margin-top:8px}
    .input{flex:1;border:1px solid #e6e6e6;border-radius:12px;padding:10px 12px}
    .btn{border:none;border-radius:12px;padding:10px 14px;font-weight:700;background:var(--grad);color:#fff;cursor:pointer}
    main{max-width:960px;margin:0 auto;padding:12px}
    #stats{font-size:12px;color:#666;margin:8px 2px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
    .card{background:#fff;border:1px solid #eee;border-radius:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04)}
    .imgwrap{aspect-ratio:1/1;overflow:hidden;background:#fafafa}
    .imgwrap img{width:100%;height:100%;object-fit:cover;display:block}
    .pad{padding:10px 12px}
    .name{font-weight:800;font-size:14px}
    .meta{font-size:12px;color:#777;margin-top:4px}
    .price{margin-top:8px;font-weight:800;color:var(--gold)}
    #more{margin:16px auto;display:block}
    nav{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:960px;background:#fff;border-top:1px solid #e0e0e0;height:56px;display:grid;grid-template-columns:repeat(4,1fr);align-items:center}
    nav a{text-decoration:none;color:#777;font-size:12px;text-align:center}
    nav a.active{color:var(--gold);font-weight:700}
    @media (max-width:420px){.grid{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
  <header>
    <div class="brand">Luminous Catalog</div>
    <div class="toolbar">
      <input id="q" class="input" placeholder="Search (e.g., sensitive scalp shampoo)" />
      <button class="btn" id="go">Search</button>
    </div>
  </header>
  <main>
    <div id="stats">Loading products…</div>
    <div id="grid" class="grid"></div>
    <button id="more" class="btn" style="display:none">Show more</button>
  </main>

  <nav>
    <a href="/index.html">Home</a>
    <a href="/catalog.html" class="active">Shop</a>
    <a href="/chat.html">Chat</a>
    <a href="/account.html">Account</a>
  </nav>

<script>
const API_BASE = '';
const LIMIT = 24;
let offset = 0;
let total = 0;

function money(cents){
  const v = (typeof cents==='number' && isFinite(cents)) ? cents : 0;
  return '$' + (v/100).toFixed(2);
}
function sanitizeImage(src){
  if(!src) return '/images/studio-beige.jpg';
  try {
    if(src.startsWith('/')) return src;
    if(src.startsWith('data:')||src.startsWith('blob:')) return src;
    if(src.includes('images.unsplash.com')||src.includes('plus.unsplash.com')) return src;
  } catch(e){}
  return '/images/studio-beige.jpg';
}
function cardHTML(it){
  const img = sanitizeImage(it.image||'');
  const sub = [it.brand||'—', it.category||'—'].filter(Boolean).join(' • ');
  return \`
  <article class="card" data-id="\${it.id}">
    <div class="imgwrap"><img src="\${img}" alt="\${(it.name||'Product').replace(/"/g,'&quot;')}" loading="lazy"/></div>
    <div class="pad">
      <div class="name">\${it.name||'Product'}</div>
      <div class="meta">\${sub||'—'}</div>
      <div class="price">\${money(it.price)}</div>
    </div>
  </article>\`;
}

function getQ(){
  try {
    const sp = new URLSearchParams(location.search);
    return (sp.get('q')||'').trim();
  } catch(e){ return ''; }
}

async function fetchProducts(reset=false){
  const q = getQ();
  if(reset){ offset=0; document.getElementById('grid').innerHTML=''; }
  if(q) document.getElementById('q').value = q;
  const url = new URL(location.origin + '/api/products');
  if(q) url.searchParams.set('q', q);
  url.searchParams.set('offset', String(offset));
  url.searchParams.set('limit', String(LIMIT));
  const r = await fetch(url.toString(), { headers: { 'Accept':'application/json' }});
  const data = await r.json();
  total = data.total||0;
  const items = Array.isArray(data.items) ? data.items : [];
  const grid = document.getElementById('grid');
  grid.insertAdjacentHTML('beforeend', items.map(cardHTML).join(''));
  const showing = Math.min(offset+LIMIT, total, grid.children.length);
  document.getElementById('stats').textContent = \`\${total} products • showing \${showing}\`;
  offset += items.length;
  document.getElementById('more').style.display = (offset < total) ? 'block' : 'none';
}

document.getElementById('go').addEventListener('click', ()=>{
  const v = (document.getElementById('q').value||'').trim();
  const next = v ? ('/catalog.html?q=' + encodeURIComponent(v)) : '/catalog.html';
  location.href = next;
});

document.getElementById('more').addEventListener('click', ()=>fetchProducts(false));

// initial load
fetchProducts(true);
</script>
</body>
</html>
